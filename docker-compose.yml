
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: db_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: B.fcosta123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_stock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db_stock
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: B.fcosta123
    depends_on:
      db:
        condition: service_healthy